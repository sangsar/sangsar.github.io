<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samisaki</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink: #ff80ab;
            --purple: #b388eb;
            --black: #0a0a0c;
            --card-bg: rgba(15, 15, 20, 0.75);
            --text: #e0d6f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--black);
            color: var(--text);
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* کهکشان پس‌زمینه */
        .galaxy {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .galaxy::before {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at center, rgba(179,136,235,0.1) 0%, transparent 70%),
                        radial-gradient(circle at 30% 40%, rgba(255,128,171,0.15) 0%, transparent 50%),
                        radial-gradient(circle at 70% 60%, rgba(200,150,220,0.1) 0%, transparent 50%);
            animation: rotateGalaxy 60s linear infinite;
        }

        @keyframes rotateGalaxy {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ستاره‌ها و سیاره‌ها */
        .stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .star, .planet {
            position: absolute;
            animation-timing-function: ease-in-out;
            animation-iteration-count: infinite;
        }

        /* ستاره‌های واقعی (پنج‌پر) */
        .star {
            background: white;
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            box-shadow: 0 0 6px var(--pink), 0 0 12px var(--purple);
            animation-name: twinkle;
            animation-duration: 4s;
        }

        /* سیاره‌های گرد */
        .planet {
            border-radius: 50%;
            background: var(--pink);
            box-shadow: 0 0 6px var(--purple), 0 0 12px var(--pink);
            animation-name: orbit;
            animation-duration: 12s;
        }

        .star:nth-child(1) { width: 6px; height: 6px; top: 12%; left: 8%; animation-delay: 0s; }
        .star:nth-child(2) { width: 4px; height: 4px; top: 25%; left: 75%; animation-delay: 1s; }
        .star:nth-child(3) { width: 5px; height: 5px; top: 58%; left: 18%; animation-delay: 0.5s; }
        .star:nth-child(4) { width: 3px; height: 3px; top: 72%; left: 82%; animation-delay: 1.5s; }
        .star:nth-child(5) { width: 7px; height: 7px; top: 8%; left: 48%; animation-delay: 0.8s; }
        .star:nth-child(6) { width: 3px; height: 3px; top: 45%; left: 65%; animation-delay: 2s; }
        .star:nth-child(7) { width: 5px; height: 5px; top: 88%; left: 35%; animation-delay: 0.3s; }
        .star:nth-child(8) { width: 4px; height: 4px; top: 32%; left: 6%; animation-delay: 2.5s; }
        .star:nth-child(9) { width: 5px; height: 5px; top: 55%; left: 90%; animation-delay: 0.2s; }
        .star:nth-child(10) { width: 3px; height: 3px; top: 68%; left: 50%; animation-delay: 1.2s; }

        .planet:nth-child(11) { width: 8px; height: 8px; top: 18%; left: 28%; animation-delay: 0s; background: var(--purple); }
        .planet:nth-child(12) { width: 6px; height: 6px; top: 62%; left: 72%; animation-delay: 2s; background: var(--pink); }
        .planet:nth-child(13) { width: 10px; height: 10px; top: 40%; left: 15%; animation-delay: 4s; background: var(--purple); }
        .planet:nth-child(14) { width: 5px; height: 5px; top: 80%; left: 55%; animation-delay: 1s; background: var(--pink); }
        .planet:nth-child(15) { width: 8px; height: 8px; top: 5%; left: 85%; animation-delay: 3s; background: var(--purple); }

        @keyframes twinkle {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.3); }
        }

        @keyframes orbit {
            0% { transform: translate(0, 0) rotate(0deg); opacity: 0.6; }
            50% { transform: translate(15px, -15px) rotate(180deg); opacity: 1; }
            100% { transform: translate(0, 0) rotate(360deg); opacity: 0.6; }
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 650px;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* لوگو + نت (بدون خطوط) */
        .logo-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 60px;
            margin-bottom: 40px;
        }

        .music-note {
            width: 60px;
            height: 60px;
            animation: danceNote 1.2s infinite ease-in-out;
            filter: drop-shadow(0 0 15px var(--pink));
        }

        @keyframes danceNote {
            0% { transform: translateY(0) rotate(-10deg); }
            50% { transform: translateY(-8px) rotate(10deg); }
            100% { transform: translateY(0) rotate(-10deg); }
        }

        .logo {
            font-family: 'Dancing Script', cursive;
            font-size: 3.8rem;
            font-weight: 700;
            color: var(--pink);
            text-shadow: 0 0 25px var(--purple), 0 0 50px var(--pink);
            letter-spacing: 6px;
            transform: rotate(-2deg);
        }

        /* لیست آهنگ */
        .song-list {
            width: 100%;
            margin-bottom: 110px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .song-item {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,128,171,0.3);
            border-radius: 14px;
            padding: 14px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .song-item:hover {
            border-color: var(--purple);
            box-shadow: 0 0 20px rgba(179,136,235,0.5), 0 0 5px var(--pink);
            transform: translateY(-3px);
            background: rgba(25,25,35,0.8);
        }

        .song-info {
            display: flex;
            flex-direction: column;
            z-index: 1;
            gap: 3px;
        }

        .song-title {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-weight: 600;
            font-size: 1.2rem;
            color: var(--pink);
            letter-spacing: 0.5px;
        }

        .song-artist {
            font-weight: 400;
            color: var(--purple);
            font-size: 0.8rem;
            letter-spacing: 0.3px;
        }

        .play-circle {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px solid var(--pink);
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            flex-shrink: 0;
        }

        .play-circle svg {
            width: 15px;
            height: 15px;
            fill: var(--pink);
        }

        .play-circle:hover {
            background: var(--pink);
            box-shadow: 0 0 20px var(--pink);
        }

        .play-circle:hover svg {
            fill: var(--black);
        }

        /* پلیر */
        .player-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 32px);
            max-width: 550px;
            background: rgba(10,10,12,0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,128,171,0.4);
            border-radius: 28px;
            padding: 10px 18px;
            display: none;
            align-items: center;
            gap: 12px;
            box-shadow: 0 0 40px rgba(255,128,171,0.2);
            z-index: 1000;
        }

        .player-container.active {
            display: flex;
        }

        .play-pause-btn {
            background: rgba(255,128,171,0.1);
            border: 2px solid var(--pink);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            flex-shrink: 0;
        }

        .play-pause-btn:hover {
            background: var(--pink);
            box-shadow: 0 0 25px var(--pink);
        }

        .play-icon::before {
            content: "";
            display: block;
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 8px 0 8px 14px;
            border-color: transparent transparent transparent var(--pink);
            margin-left: 3px;
            transition: border-color 0.3s;
        }

        .pause-icon {
            display: none;
            gap: 4px;
        }

        .pause-icon::before,
        .pause-icon::after {
            content: "";
            width: 4px;
            height: 14px;
            background: var(--pink);
            border-radius: 2px;
            transition: background 0.3s;
        }

        .play-pause-btn.playing .play-icon { display: none; }
        .play-pause-btn.playing .pause-icon { display: flex; }
        .play-pause-btn.paused .play-icon { display: block; }
        .play-pause-btn.paused .pause-icon { display: none; }

        .play-pause-btn:hover .play-icon::before { border-left-color: #0a0a0c; }
        .play-pause-btn:hover .pause-icon::before,
        .play-pause-btn:hover .pause-icon::after { background: #0a0a0c; }

        .progress-container {
            flex: 1;
            height: 5px;
            background: #2a2a2a;
            border-radius: 3px;
            cursor: pointer;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--pink), var(--purple));
            width: 0%;
            border-radius: 3px;
            box-shadow: 0 0 10px var(--pink);
            transition: width 0.1s linear;
        }

        .time {
            color: var(--pink);
            font-size: 0.7rem;
            min-width: 70px;
            text-align: right;
            font-weight: 300;
        }

        /* گرامافون بدون بازو با نور جدید */
        .vinyl-graphic {
            width: 44px;
            height: 44px;
            flex-shrink: 0;
            animation: rotateVinyl 2.5s linear infinite paused;
            position: relative;
        }

        .vinyl-graphic.playing {
            animation-play-state: running;
        }

        .vinyl-svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 6px var(--pink));
        }

        @keyframes rotateVinyl {
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 600px) {
            .logo { font-size: 2.8rem; }
            .logo-area { gap: 8px; margin-top: 45px; }
            .music-note { width: 50px; height: 50px; }
            .song-title { font-size: 1rem; }
        }
    </style>
</head>
<body>
    <!-- کهکشان -->
    <div class="galaxy"></div>

    <!-- ستاره‌های واقعی و سیاره‌ها -->
    <div class="stars-container">
        <div class="star"></div><div class="star"></div><div class="star"></div>
        <div class="star"></div><div class="star"></div><div class="star"></div>
        <div class="star"></div><div class="star"></div><div class="star"></div><div class="star"></div>
        <div class="planet"></div><div class="planet"></div><div class="planet"></div><div class="planet"></div><div class="planet"></div>
    </div>

    <div class="container">
        <div class="logo-area">
            <!-- نت موسیقی رقصان -->
            <div class="music-note">
                <svg viewBox="0 0 100 100" fill="none">
                    <path d="M40 20 L40 70 C40 78, 30 85, 25 85 C17 85, 12 78, 12 70 C12 62, 17 55, 25 55 C28 55, 30 57, 32 60 L32 30 L70 20 L70 60 C70 68, 60 75, 55 75 C47 75, 42 68, 42 60 C42 52, 47 45, 55 45 C58 45, 60 47, 62 50 L62 20 Z" fill="url(#gradPinkPurple)"/>
                    <defs>
                        <linearGradient id="gradPinkPurple" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#ff80ab"/>
                            <stop offset="100%" stop-color="#b388eb"/>
                        </linearGradient>
                    </defs>
                </svg>
            </div>
            <div class="logo">Samisaki</div>
        </div>

        <div class="song-list" id="songList"></div>

        <div class="player-container" id="playerContainer">
            <button class="play-pause-btn paused" id="playPauseBtn">
                <span class="play-icon"></span>
                <span class="pause-icon"></span>
            </button>
            <div class="progress-container" id="progressContainer">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <span class="time" id="timeDisplay">00:00 / 00:00</span>
            <div class="vinyl-graphic" id="vinylGraphic">
                <svg class="vinyl-svg" viewBox="0 0 100 100">
                    <defs>
                        <radialGradient id="vinylGrad" cx="50%" cy="50%" r="50%">
                            <stop offset="0%" stop-color="#1a1a1a"/>
                            <stop offset="12%" stop-color="#1a1a1a"/>
                            <stop offset="13%" stop-color="#2a2a2a"/>
                            <stop offset="25%" stop-color="#1a1a1a"/>
                            <stop offset="26%" stop-color="#2a2a2a"/>
                            <stop offset="40%" stop-color="#1a1a1a"/>
                            <stop offset="41%" stop-color="#2a2a2a"/>
                            <stop offset="55%" stop-color="#1a1a1a"/>
                            <stop offset="56%" stop-color="#2a2a2a"/>
                            <stop offset="70%" stop-color="#1a1a1a"/>
                            <stop offset="71%" stop-color="#2a2a2a"/>
                            <stop offset="85%" stop-color="#1a1a1a"/>
                            <stop offset="100%" stop-color="#1a1a1a"/>
                        </radialGradient>
                        <!-- نور متمرکز روی وینیل -->
                        <radialGradient id="shineLight" cx="35%" cy="35%" r="60%">
                            <stop offset="0%" stop-color="rgba(255,255,255,0.35)"/>
                            <stop offset="30%" stop-color="rgba(255,255,255,0.1)"/>
                            <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
                        </radialGradient>
                    </defs>
                    <!-- صفحه اصلی -->
                    <circle cx="50" cy="50" r="48" fill="url(#vinylGrad)" stroke="#ff80ab" stroke-width="2"/>
                    <!-- لایه نور -->
                    <circle cx="50" cy="50" r="48" fill="url(#shineLight)"/>
                    <!-- مرکز بنفش -->
                    <circle cx="50" cy="50" r="12" fill="#b388eb" stroke="#ff80ab" stroke-width="1.5"/>
                    <!-- نقطه سیاه مرکزی -->
                    <circle cx="50" cy="50" r="3" fill="#0a0a0c"/>
                </svg>
            </div>
        </div>
    </div>

    <audio id="audioPlayer"></audio>

    <script>
        const songs = [
            { title: "Bin Jip (3-Iron)", artist: "Natacha Atlas — Slvian", url: "https://dl.ritmahang.com/audio/arshive/natacha%20atlas%20-%20bin-jip%20(3-iron)%20ost%202004%20-%20slvian%20(www.delshekastegan.ir).mp3" },
            { title: "Maison", artist: "Emilio Piano x Lucie", url: "https://dl.musicviral.ir/Music/04-04/Emilio%20Piano%20x%20Lucie%20-%20Maison.mp3" },
            { title: "Summer Overture", artist: "Summer (Requiem for a Dream)", url: "https://www.musicdagh.ir/wp-content/uploads/2018/12/Summer-Overture-Summer.mp3" },
            { title: "Lux Aeterna", artist: "Winter (Requiem for a Dream)", url: "https://www.musicdagh.ir/wp-content/uploads/2018/12/Lux-Aeterna-Winter.mp3" },
            { title: "Roads", artist: "Portishead", url: "https://files.musicfeed.ir/2020/07/Portishead-Roads.mp3" },
            { title: "Game of Thrones", artist: "Ramin Djawadi", url: "https://irsv.upmusics.com/Downloads/Musics/Ramin%20Djawadi%20%7C%20Game%20Of%20Thrones%20(320).mp3" },
            { title: "Hostage", artist: "Billie Eilish", url: "https://sv.jenabmusic.com/music/2026/05/13/Billie-Eilish-Hostage.mp3" },
            { title: "Bad Guy", artist: "Billie Eilish", url: "https://sv.jenabmusic.com/music/2025/03/07/Billie%20Eilish%20-%20Bad%20Guy.Mp3" },
            { title: "No Time To Die", artist: "Billie Eilish", url: "https://sv.jenabmusic.com/music/2025/03/07/Billie%20Eilish%20-%20No%20Time%20To%20Die.Mp3" }
        ];

        const audio = document.getElementById('audioPlayer');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const progressBar = document.getElementById('progressBar');
        const progressContainer = document.getElementById('progressContainer');
        const timeDisplay = document.getElementById('timeDisplay');
        const playerContainer = document.getElementById('playerContainer');
        const vinylGraphic = document.getElementById('vinylGraphic');
        let currentSongIndex = -1;

        function formatTime(s) {
            if (isNaN(s)) return "00:00";
            const m = Math.floor(s / 60);
            const sec = Math.floor(s % 60);
            return `${m.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
        }

        function loadSong(index) {
            audio.src = songs[index].url;
            audio.load();
            playerContainer.classList.add('active');
            playPauseBtn.classList.add('paused');
            playPauseBtn.classList.remove('playing');
            vinylGraphic.classList.remove('playing');
            progressBar.style.width = '0%';
            timeDisplay.textContent = '00:00 / 00:00';
            currentSongIndex = index;
        }

        function togglePlay() {
            if (audio.paused) {
                audio.play();
                playPauseBtn.classList.add('playing');
                playPauseBtn.classList.remove('paused');
                vinylGraphic.classList.add('playing');
            } else {
                audio.pause();
                playPauseBtn.classList.add('paused');
                playPauseBtn.classList.remove('playing');
                vinylGraphic.classList.remove('playing');
            }
        }

        audio.addEventListener('timeupdate', () => {
            const pct = (audio.currentTime / audio.duration) * 100 || 0;
            progressBar.style.width = `${pct}%`;
            timeDisplay.textContent = `${formatTime(audio.currentTime)} / ${formatTime(audio.duration)}`;
        });

        audio.addEventListener('ended', () => {
            playPauseBtn.classList.add('paused');
            playPauseBtn.classList.remove('playing');
            vinylGraphic.classList.remove('playing');
        });

        progressContainer.addEventListener('click', (e) => {
            const rect = progressContainer.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const w = rect.width;
            audio.currentTime = (x / w) * audio.duration;
        });

        playPauseBtn.addEventListener('click', togglePlay);

        const listEl = document.getElementById('songList');
        songs.forEach((s, i) => {
            const item = document.createElement('div');
            item.className = 'song-item';
            item.innerHTML = `
                <div class="song-info">
                    <span class="song-title">${s.title}</span>
                    <span class="song-artist">${s.artist}</span>
                </div>
                <div class="play-circle">
                    <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                </div>
            `;
            item.querySelector('.play-circle').addEventListener('click', (e) => {
                e.stopPropagation();
                if (currentSongIndex === i) {
                    if (audio.paused) {
                        audio.play();
                        playPauseBtn.classList.add('playing');
                        playPauseBtn.classList.remove('paused');
                        vinylGraphic.classList.add('playing');
                    } else {
                        audio.pause();
                        playPauseBtn.classList.add('paused');
                        playPauseBtn.classList.remove('playing');
                        vinylGraphic.classList.remove('playing');
                    }
                } else {
                    loadSong(i);
                    audio.play();
                    playPauseBtn.classList.add('playing');
                    playPauseBtn.classList.remove('paused');
                    vinylGraphic.classList.add('playing');
                }
            });
            listEl.appendChild(item);
        });
    </script>
</body>
</html>
