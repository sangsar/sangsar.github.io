<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samisaki Music</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0B0B0C;
            background-image: 
                radial-gradient(ellipse at 20% 10%, rgba(180, 130, 40, 0.12) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 90%, rgba(140, 20, 40, 0.1) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 50%, rgba(20, 20, 20, 1) 0%, #0B0B0C 100%);
            color: #D4AF37;
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* ذرات طلایی شناور */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(2px 2px at 10% 20%, rgba(212,175,55,0.5), transparent),
                radial-gradient(1px 1px at 85% 15%, rgba(212,175,55,0.4), transparent),
                radial-gradient(2px 2px at 70% 65%, rgba(212,175,55,0.3), transparent),
                radial-gradient(1px 1px at 30% 80%, rgba(212,175,55,0.4), transparent),
                radial-gradient(1px 1px at 15% 60%, rgba(212,175,55,0.2), transparent),
                radial-gradient(2px 2px at 90% 85%, rgba(212,175,55,0.5), transparent),
                radial-gradient(1px 1px at 45% 15%, rgba(212,175,55,0.3), transparent),
                radial-gradient(1px 1px at 60% 40%, rgba(212,175,55,0.2), transparent);
            pointer-events: none;
            z-index: 0;
            animation: sparkle 5s ease-in-out infinite alternate;
        }

        @keyframes sparkle {
            0% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 800px;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* لوگوی موزیکال */
        .logo-section {
            margin-top: 50px;
            text-align: center;
            position: relative;
        }

        .logo-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .logo-music-icon {
            width: 60px;
            height: 60px;
            filter: drop-shadow(0 0 15px #D4AF37);
        }

        .logo-text {
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            font-weight: 900;
            background: linear-gradient(180deg, #FEF0C0 0%, #D4AF37 35%, #B8860B 70%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 25px rgba(212, 175, 55, 0.8));
            letter-spacing: 10px;
            line-height: 1;
        }

        .logo-subtitle {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.2rem;
            color: #D4AF37;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-top: 5px;
            opacity: 0.8;
        }

        .logo-underline {
            width: 200px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #D4AF37, #FEF0C0, #D4AF37, transparent);
            margin: 15px auto 20px;
            border-radius: 3px;
            box-shadow: 0 0 20px #D4AF37;
        }

        /* لیست آهنگ‌ها */
        .song-list {
            width: 100%;
            margin: 20px 0 140px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .song-item {
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-left: 5px solid #D4AF37;
            border-radius: 12px;
            padding: 16px 22px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
        }

        .song-item::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.15) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .song-item:hover {
            transform: translateY(-4px);
            border-left-color: #FEF0C0;
            border-left-width: 8px;
            box-shadow: 0 12px 35px rgba(212, 175, 55, 0.3), 0 0 0 1px rgba(212,175,55,0.5);
            background: rgba(20, 20, 20, 0.8);
        }

        .song-item:hover::after {
            opacity: 1;
        }

        .song-info {
            display: flex;
            flex-direction: column;
            z-index: 1;
        }

        .song-title {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 700;
            font-size: 1.5rem;
            color: #fff;
            letter-spacing: 1px;
            margin-bottom: 2px;
        }

        .song-artist {
            font-weight: 400;
            color: #D4AF37;
            font-size: 0.95rem;
            font-style: italic;
            opacity: 0.9;
        }

        /* دکمه پخش */
        .play-btn {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            border: 2px solid #D4AF37;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 1;
            flex-shrink: 0;
        }

        .play-btn svg {
            width: 20px;
            height: 20px;
            fill: #D4AF37;
            transition: fill 0.3s;
        }

        .play-btn:hover {
            background: #D4AF37;
            box-shadow: 0 0 25px #D4AF37;
            transform: scale(1.1);
        }

        .play-btn:hover svg {
            fill: #0B0B0C;
        }

        /* پلیر پایین صفحه */
        .player-container {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 40px);
            max-width: 700px;
            background: rgba(8, 8, 8, 0.9);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1.5px solid rgba(212, 175, 55, 0.5);
            border-radius: 20px;
            padding: 18px 22px;
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.25), inset 0 0 30px rgba(212, 175, 55, 0.03);
            display: none;
            z-index: 1000;
            transition: all 0.3s ease;
        }

        .player-container.active {
            display: flex;
            flex-direction: column;
        }

        .now-playing {
            color: #fff;
            font-size: 0.95rem;
            margin-bottom: 10px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 400;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .play-pause-btn {
            background: rgba(0,0,0,0.5);
            border: 2px solid #D4AF37;
            color: #D4AF37;
            font-size: 1.8rem;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
            line-height: 1;
        }

        .play-pause-btn:hover {
            background: #D4AF37;
            color: #0B0B0C;
            box-shadow: 0 0 35px rgba(212, 175, 55, 0.8);
        }

        .progress-container {
            flex: 1;
            height: 8px;
            background: #2A2A2A;
            border-radius: 4px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.8);
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #D4AF37, #FEF0C0);
            width: 0%;
            border-radius: 4px;
            position: relative;
            transition: width 0.1s linear;
            box-shadow: 0 0 12px #D4AF37;
        }

        .progress-bar::after {
            content: "";
            position: absolute;
            right: 0;
            top: 50%;
            transform: translate(50%, -50%);
            width: 14px;
            height: 14px;
            background: #FEF0C0;
            border-radius: 50%;
            box-shadow: 0 0 15px #D4AF37, 0 0 5px #fff;
        }

        .time {
            color: #D4AF37;
            font-size: 0.85rem;
            min-width: 95px;
            text-align: right;
            letter-spacing: 0.5px;
            font-weight: 300;
        }

        /* گرامافون */
        .vinyl-container {
            position: relative;
            width: 65px;
            height: 65px;
            flex-shrink: 0;
        }

        .vinyl-record {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle at 50% 50%, #0B0B0C 10%, #1A1A1A 11%, #1A1A1A 25%, #333 26%, #0B0B0C 27%, #0B0B0C 100%);
            border: 2.5px solid #D4AF37;
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.6), inset 0 0 20px rgba(0,0,0,0.9);
            position: relative;
            animation: spin 3s linear infinite paused;
        }

        .vinyl-record.spinning {
            animation-play-state: running;
        }

        .vinyl-record::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 15px;
            height: 15px;
            background: radial-gradient(circle, #FEF0C0 25%, #B8860B 80%);
            border-radius: 50%;
            box-shadow: 0 0 15px #D4AF37, 0 0 25px #D4AF37;
        }

        .tonearm {
            position: absolute;
            top: 2px;
            right: -22px;
            width: 35px;
            height: 58px;
            transform-origin: top right;
            transform: rotate(15deg);
            transition: transform 0.3s;
        }

        .tonearm .base {
            position: absolute;
            top: 0;
            right: 0;
            width: 12px;
            height: 12px;
            background: #666;
            border-radius: 50%;
            box-shadow: 0 0 6px #000;
        }

        .tonearm .arm {
            position: absolute;
            top: 12px;
            right: 5px;
            width: 3px;
            height: 38px;
            background: #999;
            border-radius: 2px;
            transform: rotate(-12deg);
            transform-origin: top right;
            box-shadow: 0 0 4px #000;
        }

        .tonearm .head {
            position: absolute;
            top: 46px;
            right: -3px;
            width: 14px;
            height: 8px;
            background: #CCC;
            border-radius: 2px;
            transform: rotate(12deg);
            box-shadow: 0 0 5px #000;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 600px) {
            .logo-text {
                font-size: 3rem;
                letter-spacing: 6px;
            }
            .logo-music-icon {
                width: 45px;
                height: 45px;
            }
            .song-title {
                font-size: 1.3rem;
            }
            .song-item {
                padding: 14px 18px;
            }
            .player-container {
                bottom: 15px;
                padding: 14px 16px;
                border-radius: 16px;
            }
            .controls {
                gap: 10px;
            }
            .play-pause-btn {
                width: 42px;
                height: 42px;
                font-size: 1.5rem;
            }
            .vinyl-container {
                width: 50px;
                height: 50px;
            }
            .time {
                min-width: 80px;
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- لوگوی موزیکال -->
        <div class="logo-section">
            <div class="logo-wrapper">
                <svg class="logo-music-icon" viewBox="0 0 100 100" fill="none">
                    <circle cx="50" cy="50" r="48" stroke="#D4AF37" stroke-width="2" fill="none" opacity="0.6"/>
                    <circle cx="50" cy="50" r="40" stroke="#D4AF37" stroke-width="1" fill="none" opacity="0.3"/>
                    <path d="M38 70V35L68 28V60" stroke="#D4AF37" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                    <circle cx="35" cy="70" r="8" fill="none" stroke="#D4AF37" stroke-width="2.5"/>
                    <circle cx="65" cy="60" r="8" fill="none" stroke="#D4AF37" stroke-width="2.5"/>
                    <path d="M68 28L38 35" stroke="#FEF0C0" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
                </svg>
                <div class="logo-text">SAMISAKI</div>
            </div>
            <div class="logo-subtitle">music</div>
            <div class="logo-underline"></div>
        </div>

        <!-- لیست آهنگ‌ها -->
        <div class="song-list" id="songList"></div>

        <!-- پلیر -->
        <div class="player-container" id="playerContainer">
            <div class="now-playing" id="nowPlaying">Select a song</div>
            <div class="controls">
                <button class="play-pause-btn" id="playPauseBtn">▶️</button>
                <div class="progress-container" id="progressContainer">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
                <span class="time" id="timeDisplay">00:00 / 00:00</span>
                <div class="vinyl-container">
                    <div class="vinyl-record" id="vinylRecord"></div>
                    <div class="tonearm">
                        <div class="base"></div>
                        <div class="arm"></div>
                        <div class="head"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <audio id="audioPlayer"></audio>

    <script>
        const songs = [
            { title: "Bin Jip (3-Iron)", artist: "Natacha Atlas - Slvian", url: "https://dl.ritmahang.com/audio/arshive/natacha%20atlas%20-%20bin-jip%20(3-iron)%20ost%202004%20-%20slvian%20(www.delshekastegan.ir).mp3" },
            { title: "Maison", artist: "Emilio Piano x Lucie", url: "https://dl.musicviral.ir/Music/04-04/Emilio%20Piano%20x%20Lucie%20-%20Maison.mp3" },
            { title: "Summer Overture", artist: "Summer (Requiem for a Dream)", url: "https://www.musicdagh.ir/wp-content/uploads/2018/12/Summer-Overture-Summer.mp3" },
            { title: "Lux Aeterna", artist: "Winter (Requiem for a Dream)", url: "https://www.musicdagh.ir/wp-content/uploads/2018/12/Lux-Aeterna-Winter.mp3" },
            { title: "Roads", artist: "Portishead", url: "https://files.musicfeed.ir/2020/07/Portishead-Roads.mp3" },
            { title: "Game of Thrones", artist: "Ramin Djawadi", url: "https://irsv.upmusics.com/Downloads/Musics/Ramin%20Djawadi%20%7C%20Game%20Of%20Thrones%20(320).mp3" },
            { title: "Hostage", artist: "Billie Eilish", url: "https://sv.jenabmusic.com/music/2026/05/13/Billie-Eilish-Hostage.mp3" },
            { title: "Bad Guy", artist: "Billie Eilish", url: "https://sv.jenabmusic.com/music/2025/03/07/Billie%20Eilish%20-%20Bad%20Guy.Mp3" },
            { title: "No Time To Die", artist: "Billie Eilish", url: "https://sv.jenabmusic.com/music/2025/03/07/Billie%20Eilish%20-%20No%20Time%20To%20Die.Mp3" }
        ];

        const audio = document.getElementById('audioPlayer');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const progressBar = document.getElementById('progressBar');
        const progressContainer = document.getElementById('progressContainer');
        const timeDisplay = document.getElementById('timeDisplay');
        const nowPlaying = document.getElementById('nowPlaying');
        const playerContainer = document.getElementById('playerContainer');
        const vinylRecord = document.getElementById('vinylRecord');
        let currentSongIndex = -1;

        function formatTime(s) {
            if (isNaN(s)) return "00:00";
            const m = Math.floor(s / 60);
            const sec = Math.floor(s % 60);
            return `${m.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
        }

        function loadSong(index) {
            audio.src = songs[index].url;
            audio.load();
            nowPlaying.textContent = `${songs[index].title} - ${songs[index].artist}`;
            playerContainer.classList.add('active');
            playPauseBtn.textContent = '▶️';
            vinylRecord.classList.remove('spinning');
            progressBar.style.width = '0%';
            timeDisplay.textContent = '00:00 / 00:00';
            currentSongIndex = index;
        }

        function togglePlay() {
            if (audio.paused) {
                audio.play();
                playPauseBtn.textContent = '⏸️';
                vinylRecord.classList.add('spinning');
            } else {
                audio.pause();
                playPauseBtn.textContent = '▶️';
                vinylRecord.classList.remove('spinning');
            }
        }

        audio.addEventListener('timeupdate', () => {
            const pct = (audio.currentTime / audio.duration) * 100 || 0;
            progressBar.style.width = `${pct}%`;
            timeDisplay.textContent = `${formatTime(audio.currentTime)} / ${formatTime(audio.duration)}`;
        });

        audio.addEventListener('ended', () => {
            playPauseBtn.textContent = '▶️';
            vinylRecord.classList.remove('spinning');
            progressBar.style.width = '0%';
        });

        progressContainer.addEventListener('click', (e) => {
            const rect = progressContainer.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const w = rect.width;
            audio.currentTime = (x / w) * audio.duration;
        });

        playPauseBtn.addEventListener('click', togglePlay);

        const listEl = document.getElementById('songList');
        songs.forEach((s, i) => {
            const item = document.createElement('div');
            item.className = 'song-item';
            item.innerHTML = `
                <div class="song-info">
                    <span class="song-title">${s.title}</span>
                    <span class="song-artist">${s.artist}</span>
                </div>
                <div class="play-btn">
                    <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                </div>
            `;
            item.querySelector('.play-btn').addEventListener('click', (e) => {
                e.stopPropagation();
                if (currentSongIndex === i) {
                    if (audio.paused) { audio.play(); playPauseBtn.textContent = '⏸️'; vinylRecord.classList.add('spinning'); }
                    else { audio.pause(); playPauseBtn.textContent = '▶️'; vinylRecord.classList.remove('spinning'); }
                } else {
                    loadSong(i); audio.play(); playPauseBtn.textContent = '⏸️'; vinylRecord.classList.add('spinning');
                }
            });
            listEl.appendChild(item);
        });
    </script>
</body>
</html>
