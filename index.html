<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samisaki</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Montserrat:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --gold-light: #FEF0C0;
            --black-deep: #060608;
            --black-card: rgba(14, 14, 18, 0.75);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--black-deep);
            color: var(--gold);
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* پس‌زمینهٔ مخملی لوکس */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                /* بافت مخملی */
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 2px,
                    rgba(255, 255, 255, 0.008) 2px,
                    rgba(255, 255, 255, 0.008) 4px
                ),
                /* خطوط عمودی طلایی */
                repeating-linear-gradient(
                    90deg,
                    transparent,
                    transparent 80px,
                    rgba(212, 175, 55, 0.03) 80px,
                    rgba(212, 175, 55, 0.03) 81px
                ),
                /* هاله‌های طلایی */
                radial-gradient(ellipse at 20% 15%, rgba(212, 175, 55, 0.2) 0%, transparent 45%),
                radial-gradient(ellipse at 80% 85%, rgba(212, 175, 55, 0.15) 0%, transparent 45%),
                radial-gradient(ellipse at 40% 50%, rgba(180, 130, 40, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        /* ذرات طلایی */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            background: var(--gold);
            box-shadow: 0 0 6px var(--gold), 0 0 12px var(--gold);
            animation: float 6s infinite ease-in-out;
            opacity: 0.7;
        }

        .particle:nth-child(1) { width: 3px; height: 3px; top: 15%; left: 12%; animation-delay: 0s; }
        .particle:nth-child(2) { width: 2px; height: 2px; top: 25%; left: 78%; animation-delay: 1s; }
        .particle:nth-child(3) { width: 3px; height: 3px; top: 65%; left: 22%; animation-delay: 2s; }
        .particle:nth-child(4) { width: 2px; height: 2px; top: 75%; left: 85%; animation-delay: 0.5s; }
        .particle:nth-child(5) { width: 2px; height: 2px; top: 10%; left: 50%; animation-delay: 1.5s; }
        .particle:nth-child(6) { width: 3px; height: 3px; top: 45%; left: 65%; animation-delay: 2.5s; }
        .particle:nth-child(7) { width: 2px; height: 2px; top: 85%; left: 40%; animation-delay: 3s; }
        .particle:nth-child(8) { width: 3px; height: 3px; top: 35%; left: 8%; animation-delay: 0.8s; }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); opacity: 0.7; }
            50% { transform: translateY(-20px) scale(1.3); opacity: 1; }
        }

        /* حاشیهٔ طلایی */
        .border-frame {
            position: fixed;
            top: 10px;
            left: 10px;
            right: 10px;
            bottom: 10px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 6px;
            pointer-events: none;
            z-index: 0;
            box-shadow: inset 0 0 40px rgba(212, 175, 55, 0.08);
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 680px;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* لوگو - دست نخورده */
        .logo {
            font-family: 'Dancing Script', cursive;
            font-size: 3.5rem;
            font-weight: 700;
            color: #FEF0C0;
            text-shadow: 0 0 30px rgba(212, 175, 55, 0.7), 0 0 60px rgba(212, 175, 55, 0.3);
            letter-spacing: 5px;
            margin-top: 60px;
            margin-bottom: 45px;
            transform: rotate(-2deg);
            transition: all 0.3s ease;
        }

        .logo:hover {
            transform: rotate(0deg) scale(1.04);
            text-shadow: 0 0 45px rgba(254, 240, 192, 1), 0 0 90px rgba(212, 175, 55, 0.5);
        }

        /* لیست آهنگ‌ها */
        .song-list {
            width: 100%;
            margin-bottom: 110px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .song-item {
            background: var(--black-card);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(212, 175, 55, 0.22);
            border-radius: 12px;
            padding: 13px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 3px 15px rgba(0, 0, 0, 0.5);
        }

        .song-item::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.08) 0%, transparent 40%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .song-item:hover {
            border-color: rgba(254, 240, 192, 0.6);
            box-shadow: 0 6px 25px rgba(212, 175, 55, 0.2), 0 0 0 1px rgba(212, 175, 55, 0.4);
            transform: translateY(-2px);
            background: rgba(18, 18, 22, 0.8);
        }

        .song-item:hover::after {
            opacity: 1;
        }

        .song-info {
            display: flex;
            flex-direction: column;
            z-index: 1;
            gap: 2px;
        }

        .song-title {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 600;
            font-size: 1.15rem;
            color: #fff;
            letter-spacing: 0.3px;
            line-height: 1.2;
        }

        .song-artist {
            font-weight: 400;
            color: #C9A84C;
            font-size: 0.8rem;
            font-style: italic;
            line-height: 1.2;
        }

        /* دکمه پخش */
        .play-circle {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px solid var(--gold);
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 1;
            flex-shrink: 0;
        }

        .play-circle svg {
            width: 15px;
            height: 15px;
            fill: var(--gold);
            transition: fill 0.3s;
        }

        .play-circle:hover {
            background: var(--gold);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.7);
            transform: scale(1.1);
        }

        .play-circle:hover svg {
            fill: #060608;
        }

        /* پلیر */
        .player-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 32px);
            max-width: 550px;
            background: rgba(8, 8, 10, 0.92);
            backdrop-filter: blur(22px);
            -webkit-backdrop-filter: blur(22px);
            border: 1px solid rgba(212, 175, 55, 0.45);
            border-radius: 28px;
            padding: 10px 18px;
            display: none;
            align-items: center;
            gap: 12px;
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.2), 0 0 80px rgba(0, 0, 0, 0.7);
            z-index: 1000;
        }

        .player-container.active {
            display: flex;
        }

        .play-pause-btn {
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid var(--gold);
            color: var(--gold);
            font-size: 1.4rem;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            flex-shrink: 0;
            line-height: 1;
        }

        .play-pause-btn:hover {
            background: var(--gold);
            color: #060608;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.8);
        }

        .progress-container {
            flex: 1;
            height: 5px;
            background: #222;
            border-radius: 3px;
            cursor: pointer;
            overflow: hidden;
            box-shadow: inset 0 1px 3px #000;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--gold), var(--gold-light));
            width: 0%;
            border-radius: 3px;
            box-shadow: 0 0 8px var(--gold);
            transition: width 0.1s linear;
        }

        .time {
            color: var(--gold);
            font-size: 0.7rem;
            min-width: 70px;
            text-align: right;
            font-weight: 300;
            letter-spacing: 0.3px;
        }

        /* گرامافون گرافیکی */
        .vinyl-graphic {
            width: 38px;
            height: 38px;
            flex-shrink: 0;
            position: relative;
        }

        .vinyl-disc {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background:
                radial-gradient(
                    circle at 50% 50%,
                    #0a0a0a 14%,
                    #111 15%,
                    #111 22%,
                    #2a2a2a 23%,
                    #0a0a0a 24%,
                    #0a0a0a 30%,
                    #1a1a1a 31%,
                    #1a1a1a 38%,
                    #2a2a2a 39%,
                    #0a0a0a 40%,
                    #0a0a0a 100%
                );
            border: 2px solid var(--gold);
            box-shadow:
                0 0 12px rgba(212, 175, 55, 0.5),
                inset 0 0 10px rgba(0,0,0,0.8),
                0 0 0 1px rgba(254,240,192,0.2);
            animation: rotateVinyl 2.5s linear infinite paused;
            position: relative;
        }

        .vinyl-disc::after {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 10px;
            height: 10px;
            background: radial-gradient(circle, #FEF0C0 20%, #B8860B 80%);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--gold), 0 0 16px var(--gold);
        }

        /* بازتاب نور روی وینیل */
        .vinyl-shine {
            position: absolute;
            top: 4px;
            left: 10px;
            width: 12px;
            height: 5px;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            transform: rotate(-30deg);
            pointer-events: none;
            animation: rotateVinyl 2.5s linear infinite paused;
        }

        .vinyl-graphic.playing .vinyl-disc,
        .vinyl-graphic.playing .vinyl-shine {
            animation-play-state: running;
        }

        @keyframes rotateVinyl {
            100% { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 600px) {
            .logo {
                font-size: 2.8rem;
                margin-top: 45px;
                margin-bottom: 35px;
            }
            .song-title {
                font-size: 1.05rem;
            }
            .song-artist {
                font-size: 0.75rem;
            }
            .song-item {
                padding: 11px 15px;
            }
            .player-container {
                bottom: 14px;
                padding: 8px 14px;
                gap: 10px;
                border-radius: 24px;
            }
            .play-pause-btn {
                width: 34px;
                height: 34px;
                font-size: 1.2rem;
            }
            .vinyl-graphic {
                width: 32px;
                height: 32px;
            }
            .time {
                min-width: 60px;
                font-size: 0.65rem;
            }
            .border-frame {
                top: 6px;
                left: 6px;
                right: 6px;
                bottom: 6px;
            }
        }
    </style>
</head>
<body>
    <!-- ذرات طلایی -->
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <!-- حاشیه طلایی -->
    <div class="border-frame"></div>

    <div class="container">
        <!-- لوگو -->
        <div class="logo">Samisaki</div>

        <!-- لیست آهنگ -->
        <div class="song-list" id="songList"></div>

        <!-- پلیر -->
        <div class="player-container" id="playerContainer">
            <button class="play-pause-btn" id="playPauseBtn">▶️</button>
            <div class="progress-container" id="progressContainer">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <span class="time" id="timeDisplay">00:00 / 00:00</span>
            <div class="vinyl-graphic" id="vinylGraphic">
                <div class="vinyl-disc"></div>
                <div class="vinyl-shine"></div>
            </div>
        </div>
    </div>

    <audio id="audioPlayer"></audio>

    <script>
        const songs = [
            { title: "Bin Jip (3-Iron)", artist: "Natacha Atlas - Slvian", url: "https://dl.ritmahang.com/audio/arshive/natacha%20atlas%20-%20bin-jip%20(3-iron)%20ost%202004%20-%20slvian%20(www.delshekastegan.ir).mp3" },
            { title: "Maison", artist: "Emilio Piano x Lucie", url: "https://dl.musicviral.ir/Music/04-04/Emilio%20Piano%20x%20Lucie%20-%20Maison.mp3" },
            { title: "Summer Overture", artist: "Summer", url: "https://www.musicdagh.ir/wp-content/uploads/2018/12/Summer-Overture-Summer.mp3" },
            { title: "Lux Aeterna", artist: "Winter", url: "https://www.musicdagh.ir/wp-content/uploads/2018/12/Lux-Aeterna-Winter.mp3" },
            { title: "Roads", artist: "Portishead", url: "https://files.musicfeed.ir/2020/07/Portishead-Roads.mp3" },
            { title: "Game of Thrones", artist: "Ramin Djawadi", url: "https://irsv.upmusics.com/Downloads/Musics/Ramin%20Djawadi%20%7C%20Game%20Of%20Thrones%20(320).mp3" },
            { title: "Hostage", artist: "Billie Eilish", url: "https://sv.jenabmusic.com/music/2026/05/13/Billie-Eilish-Hostage.mp3" },
            { title: "Bad Guy", artist: "Billie Eilish", url: "https://sv.jenabmusic.com/music/2025/03/07/Billie%20Eilish%20-%20Bad%20Guy.Mp3" },
            { title: "No Time To Die", artist: "Billie Eilish", url: "https://sv.jenabmusic.com/music/2025/03/07/Billie%20Eilish%20-%20No%20Time%20To%20Die.Mp3" }
        ];

        const audio = document.getElementById('audioPlayer');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const progressBar = document.getElementById('progressBar');
        const progressContainer = document.getElementById('progressContainer');
        const timeDisplay = document.getElementById('timeDisplay');
        const playerContainer = document.getElementById('playerContainer');
        const vinylGraphic = document.getElementById('vinylGraphic');
        let currentSongIndex = -1;

        function formatTime(s) {
            if (isNaN(s)) return "00:00";
            const m = Math.floor(s / 60);
            const sec = Math.floor(s % 60);
            return `${m.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
        }

        function loadSong(index) {
            audio.src = songs[index].url;
            audio.load();
            playerContainer.classList.add('active');
            playPauseBtn.textContent = '▶️';
            vinylGraphic.classList.remove('playing');
            progressBar.style.width = '0%';
            timeDisplay.textContent = '00:00 / 00:00';
            currentSongIndex = index;
        }

        function togglePlay() {
            if (audio.paused) {
                audio.play();
                playPauseBtn.textContent = '⏸️';
                vinylGraphic.classList.add('playing');
            } else {
                audio.pause();
                playPauseBtn.textContent = '▶️';
                vinylGraphic.classList.remove('playing');
            }
        }

        audio.addEventListener('timeupdate', () => {
            const pct = (audio.currentTime / audio.duration) * 100 || 0;
            progressBar.style.width = `${pct}%`;
            timeDisplay.textContent = `${formatTime(audio.currentTime)} / ${formatTime(audio.duration)}`;
        });

        audio.addEventListener('ended', () => {
            playPauseBtn.textContent = '▶️';
            vinylGraphic.classList.remove('playing');
            progressBar.style.width = '0%';
        });

        progressContainer.addEventListener('click', (e) => {
            const rect = progressContainer.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const w = rect.width;
            audio.currentTime = (x / w) * audio.duration;
        });

        playPauseBtn.addEventListener('click', togglePlay);

        const listEl = document.getElementById('songList');
        songs.forEach((s, i) => {
            const item = document.createElement('div');
            item.className = 'song-item';
            item.innerHTML = `
                <div class="song-info">
                    <span class="song-title">${s.title}</span>
                    <span class="song-artist">${s.artist}</span>
                </div>
                <div class="play-circle">
                    <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                </div>
            `;
            item.querySelector('.play-circle').addEventListener('click', (e) => {
                e.stopPropagation();
                if (currentSongIndex === i) {
                    if (audio.paused) { audio.play(); playPauseBtn.textContent = '⏸️'; vinylGraphic.classList.add('playing'); }
                    else { audio.pause(); playPauseBtn.textContent = '▶️'; vinylGraphic.classList.remove('playing'); }
                } else {
                    loadSong(i); audio.play(); playPauseBtn.textContent = '⏸️'; vinylGraphic.classList.add('playing');
                }
            });
            listEl.appendChild(item);
        });
    </script>
</body>
</html>
