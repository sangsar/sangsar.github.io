<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samisaki</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Montserrat:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #08080A;
            color: #D4AF37;
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* لایه‌های پس‌زمینهٔ لوکس */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                /* خطوط عمودی طلایی محو */
                repeating-linear-gradient(
                    90deg,
                    transparent,
                    transparent 60px,
                    rgba(212, 175, 55, 0.04) 60px,
                    rgba(212, 175, 55, 0.04) 62px
                ),
                /* هاله‌های درخشان */
                radial-gradient(ellipse at 15% 20%, rgba(212, 175, 55, 0.18) 0%, transparent 50%),
                radial-gradient(ellipse at 85% 80%, rgba(180, 130, 40, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 10%, rgba(140, 20, 40, 0.1) 0%, transparent 60%),
                radial-gradient(ellipse at 60% 90%, rgba(100, 80, 20, 0.12) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        /* ذرات طلایی شناور */
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                radial-gradient(3px 3px at 12% 28%, rgba(212, 175, 55, 0.7), transparent),
                radial-gradient(2px 2px at 82% 18%, rgba(255, 240, 200, 0.6), transparent),
                radial-gradient(2px 2px at 68% 72%, rgba(212, 175, 55, 0.5), transparent),
                radial-gradient(3px 3px at 32% 82%, rgba(254, 240, 192, 0.6), transparent),
                radial-gradient(1px 1px at 10% 58%, rgba(212, 175, 55, 0.4), transparent),
                radial-gradient(2px 2px at 88% 85%, rgba(212, 175, 55, 0.5), transparent),
                radial-gradient(1px 1px at 45% 12%, rgba(255, 240, 200, 0.4), transparent),
                radial-gradient(2px 2px at 55% 40%, rgba(212, 175, 55, 0.3), transparent);
            background-size: 300px 300px;
            pointer-events: none;
            z-index: 0;
            animation: sparkle 6s ease-in-out infinite alternate;
        }

        @keyframes sparkle {
            0% {
                opacity: 0.6;
                transform: translateY(0);
            }
            100% {
                opacity: 1;
                transform: translateY(-8px);
            }
        }

        /* حاشیهٔ طلایی دور صفحه */
        .gold-border {
            position: fixed;
            top: 8px;
            left: 8px;
            right: 8px;
            bottom: 8px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            pointer-events: none;
            z-index: 0;
            border-radius: 4px;
            box-shadow: inset 0 0 30px rgba(212, 175, 55, 0.1), 0 0 30px rgba(212, 175, 55, 0.1);
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 750px;
            padding: 0 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* لوگو */
        .logo {
            font-family: 'Dancing Script', cursive;
            font-size: 3.5rem;
            font-weight: 700;
            color: #FEF0C0;
            text-shadow: 0 0 30px rgba(212, 175, 55, 0.7), 0 0 10px #000, 0 0 60px rgba(212, 175, 55, 0.3);
            letter-spacing: 4px;
            margin-top: 60px;
            margin-bottom: 50px;
            transform: rotate(-2deg);
            transition: transform 0.3s ease, text-shadow 0.3s;
        }

        .logo:hover {
            transform: rotate(0deg) scale(1.05);
            text-shadow: 0 0 40px rgba(254, 240, 192, 1), 0 0 80px rgba(212, 175, 55, 0.5);
        }

        /* لیست آهنگ‌ها */
        .song-list {
            width: 100%;
            margin-bottom: 120px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .song-item {
            background: rgba(12, 12, 16, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(212, 175, 55, 0.25);
            border-radius: 14px;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        .song-item::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.12) 0%, transparent 50%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .song-item:hover {
            border-color: #FEF0C0;
            box-shadow: 0 8px 30px rgba(212, 175, 55, 0.3), 0 0 0 1px rgba(212, 175, 55, 0.5);
            transform: translateY(-3px);
            background: rgba(18, 18, 22, 0.8);
        }

        .song-item:hover::after {
            opacity: 1;
        }

        .song-info {
            display: flex;
            flex-direction: column;
            z-index: 1;
        }

        .song-title {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 600;
            font-size: 1.45rem;
            color: #fff;
            letter-spacing: 0.5px;
            margin-bottom: 3px;
        }

        .song-artist {
            font-weight: 400;
            color: #C9A84C;
            font-size: 0.9rem;
            font-style: italic;
        }

        /* دکمه پخش */
        .play-circle {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: 2px solid #D4AF37;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 1;
            flex-shrink: 0;
        }

        .play-circle svg {
            width: 18px;
            height: 18px;
            fill: #D4AF37;
            transition: fill 0.3s;
        }

        .play-circle:hover {
            background: #D4AF37;
            box-shadow: 0 0 25px #D4AF37;
            transform: scale(1.12);
        }

        .play-circle:hover svg {
            fill: #08080A;
        }

        /* پلیر جمع‌وجور */
        .player-container {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 40px);
            max-width: 600px;
            background: rgba(10, 10, 12, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.5);
            border-radius: 30px;
            padding: 12px 20px;
            display: none;
            align-items: center;
            gap: 14px;
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.25), 0 0 80px rgba(0, 0, 0, 0.6);
            z-index: 1000;
        }

        .player-container.active {
            display: flex;
        }

        .play-pause-btn {
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #D4AF37;
            color: #D4AF37;
            font-size: 1.6rem;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            line-height: 1;
            flex-shrink: 0;
        }

        .play-pause-btn:hover {
            background: #D4AF37;
            color: #08080A;
            box-shadow: 0 0 20px #D4AF37;
        }

        .progress-container {
            flex: 1;
            height: 6px;
            background: #2A2A2E;
            border-radius: 3px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 1px 3px #000;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #D4AF37, #FEF0C0);
            width: 0%;
            border-radius: 3px;
            box-shadow: 0 0 10px #D4AF37;
            transition: width 0.1s linear;
        }

        /* وینیل کوچک */
        .mini-vinyl {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: radial-gradient(circle at 50% 50%, #0a0a0a 18%, #1a1a1a 19%, #1a1a1a 32%, #333 33%, #0a0a0a 34%, #0a0a0a 100%);
            border: 2px solid #D4AF37;
            box-shadow: 0 0 12px rgba(212, 175, 55, 0.5);
            flex-shrink: 0;
            animation: spin 2.5s linear infinite paused;
        }

        .mini-vinyl.spinning {
            animation-play-state: running;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        .time {
            color: #D4AF37;
            font-size: 0.8rem;
            min-width: 80px;
            text-align: right;
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .gold-border {
                top: 5px;
                left: 5px;
                right: 5px;
                bottom: 5px;
            }
            .logo {
                font-size: 2.8rem;
                margin-top: 50px;
                margin-bottom: 40px;
            }
            .song-title {
                font-size: 1.3rem;
            }
            .player-container {
                bottom: 18px;
                padding: 10px 15px;
                gap: 10px;
                border-radius: 24px;
            }
            .play-pause-btn {
                width: 38px;
                height: 38px;
                font-size: 1.4rem;
            }
            .mini-vinyl {
                width: 30px;
                height: 30px;
            }
            .time {
                min-width: 70px;
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>
    <div class="gold-border"></div>

    <div class="container">
        <!-- لوگوی ایتالیک فرانسوی -->
        <div class="logo">Samisaki</div>

        <!-- لیست آهنگ‌ها -->
        <div class="song-list" id="songList"></div>

        <!-- پلیر جمع‌وجور -->
        <div class="player-container" id="playerContainer">
            <button class="play-pause-btn" id="playPauseBtn">▶️</button>
            <div class="progress-container" id="progressContainer">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <span class="time" id="timeDisplay">00:00 / 00:00</span>
            <div class="mini-vinyl" id="miniVinyl"></div>
        </div>
    </div>

    <audio id="audioPlayer"></audio>

    <script>
        const songs = [
            { title: "Bin Jip (3-Iron)", artist: "Natacha Atlas - Slvian", url: "https://dl.ritmahang.com/audio/arshive/natacha%20atlas%20-%20bin-jip%20(3-iron)%20ost%202004%20-%20slvian%20(www.delshekastegan.ir).mp3" },
            { title: "Maison", artist: "Emilio Piano x Lucie", url: "https://dl.musicviral.ir/Music/04-04/Emilio%20Piano%20x%20Lucie%20-%20Maison.mp3" },
            { title: "Summer Overture", artist: "Summer (Requiem for a Dream)", url: "https://www.musicdagh.ir/wp-content/uploads/2018/12/Summer-Overture-Summer.mp3" },
            { title: "Lux Aeterna", artist: "Winter (Requiem for a Dream)", url: "https://www.musicdagh.ir/wp-content/uploads/2018/12/Lux-Aeterna-Winter.mp3" },
            { title: "Roads", artist: "Portishead", url: "https://files.musicfeed.ir/2020/07/Portishead-Roads.mp3" },
            { title: "Game of Thrones", artist: "Ramin Djawadi", url: "https://irsv.upmusics.com/Downloads/Musics/Ramin%20Djawadi%20%7C%20Game%20Of%20Thrones%20(320).mp3" },
            { title: "Hostage", artist: "Billie Eilish", url: "https://sv.jenabmusic.com/music/2026/05/13/Billie-Eilish-Hostage.mp3" },
            { title: "Bad Guy", artist: "Billie Eilish", url: "https://sv.jenabmusic.com/music/2025/03/07/Billie%20Eilish%20-%20Bad%20Guy.Mp3" },
            { title: "No Time To Die", artist: "Billie Eilish", url: "https://sv.jenabmusic.com/music/2025/03/07/Billie%20Eilish%20-%20No%20Time%20To%20Die.Mp3" }
        ];

        const audio = document.getElementById('audioPlayer');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const progressBar = document.getElementById('progressBar');
        const progressContainer = document.getElementById('progressContainer');
        const timeDisplay = document.getElementById('timeDisplay');
        const playerContainer = document.getElementById('playerContainer');
        const miniVinyl = document.getElementById('miniVinyl');
        let currentSongIndex = -1;

        function formatTime(s) {
            if (isNaN(s)) return "00:00";
            const m = Math.floor(s / 60);
            const sec = Math.floor(s % 60);
            return `${m.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
        }

        function loadSong(index) {
            audio.src = songs[index].url;
            audio.load();
            playerContainer.classList.add('active');
            playPauseBtn.textContent = '▶️';
            miniVinyl.classList.remove('spinning');
            progressBar.style.width = '0%';
            timeDisplay.textContent = '00:00 / 00:00';
            currentSongIndex = index;
        }

        function togglePlay() {
            if (audio.paused) {
                audio.play();
                playPauseBtn.textContent = '⏸️';
                miniVinyl.classList.add('spinning');
            } else {
                audio.pause();
                playPauseBtn.textContent = '▶️';
                miniVinyl.classList.remove('spinning');
            }
        }

        audio.addEventListener('timeupdate', () => {
            const pct = (audio.currentTime / audio.duration) * 100 || 0;
            progressBar.style.width = `${pct}%`;
            timeDisplay.textContent = `${formatTime(audio.currentTime)} / ${formatTime(audio.duration)}`;
        });

        audio.addEventListener('ended', () => {
            playPauseBtn.textContent = '▶️';
            miniVinyl.classList.remove('spinning');
            progressBar.style.width = '0%';
        });

        progressContainer.addEventListener('click', (e) => {
            const rect = progressContainer.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const w = rect.width;
            audio.currentTime = (x / w) * audio.duration;
        });

        playPauseBtn.addEventListener('click', togglePlay);

        const listEl = document.getElementById('songList');
        songs.forEach((s, i) => {
            const item = document.createElement('div');
            item.className = 'song-item';
            item.innerHTML = `
                <div class="song-info">
                    <span class="song-title">${s.title}</span>
                    <span class="song-artist">${s.artist}</span>
                </div>
                <div class="play-circle">
                    <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                </div>
            `;
            item.querySelector('.play-circle').addEventListener('click', (e) => {
                e.stopPropagation();
                if (currentSongIndex === i) {
                    if (audio.paused) { audio.play(); playPauseBtn.textContent = '⏸️'; miniVinyl.classList.add('spinning'); }
                    else { audio.pause(); playPauseBtn.textContent = '▶️'; miniVinyl.classList.remove('spinning'); }
                } else {
                    loadSong(i); audio.play(); playPauseBtn.textContent = '⏸️'; miniVinyl.classList.add('spinning');
                }
            });
            listEl.appendChild(item);
        });
    </script>
</body>
</html>
