<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samisaki</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --gold-light: #FEF0C0;
            --black-deep: #050508;
            --black-card: rgba(8, 8, 12, 0.8);
            --silver: #C0C0C0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--black-deep);
            color: var(--gold);
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* پس‌زمینهٔ بلک اند گلد پریمیوم */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                repeating-linear-gradient(45deg, transparent, transparent 35px, rgba(212,175,55,0.05) 35px, rgba(212,175,55,0.05) 37px),
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.02) 2px, rgba(255,255,255,0.02) 4px),
                radial-gradient(circle at 20% 30%, rgba(255,215,0,0.2) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(200,150,50,0.15) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(180,130,40,0.1) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* ذرات طلایی درخشان */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            background: var(--gold-light);
            box-shadow: 0 0 12px var(--gold), 0 0 25px rgba(255,215,0,0.7);
            animation: floatParticle 8s infinite ease-in-out;
        }

        .particle:nth-child(1) { width: 5px; height: 5px; top: 18%; left: 12%; animation-delay: 0s; }
        .particle:nth-child(2) { width: 3px; height: 3px; top: 25%; left: 78%; animation-delay: 1.5s; }
        .particle:nth-child(3) { width: 4px; height: 4px; top: 65%; left: 20%; animation-delay: 3s; }
        .particle:nth-child(4) { width: 2px; height: 2px; top: 72%; left: 85%; animation-delay: 0.8s; }
        .particle:nth-child(5) { width: 3px; height: 3px; top: 10%; left: 50%; animation-delay: 2.2s; }
        .particle:nth-child(6) { width: 5px; height: 5px; top: 45%; left: 65%; animation-delay: 4s; }
        .particle:nth-child(7) { width: 2px; height: 2px; top: 88%; left: 40%; animation-delay: 1.1s; }
        .particle:nth-child(8) { width: 4px; height: 4px; top: 32%; left: 8%; animation-delay: 2.8s; }

        @keyframes floatParticle {
            0%, 100% { transform: translateY(0) scale(1); opacity: 0.7; }
            50% { transform: translateY(-30px) scale(1.4); opacity: 1; }
        }

        /* حاشیهٔ طلایی */
        .border-frame {
            position: fixed;
            top: 12px;
            left: 12px;
            right: 12px;
            bottom: 12px;
            border: 1px solid rgba(212,175,55,0.5);
            border-radius: 8px;
            pointer-events: none;
            z-index: 0;
            box-shadow: inset 0 0 60px rgba(212,175,55,0.12), 0 0 40px rgba(212,175,55,0.2);
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 680px;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* بخش لوگو + مینیون */
        .logo-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-top: 60px;
            margin-bottom: 45px;
        }

        .minion-container {
            animation: danceBody 1s infinite ease-in-out;
            filter: drop-shadow(0 0 15px #D4AF37);
        }

        @keyframes danceBody {
            0%, 100% { transform: translateY(0) rotate(-2deg); }
            50% { transform: translateY(-5px) rotate(2deg); }
        }

        .logo {
            font-family: 'Dancing Script', cursive;
            font-size: 3.5rem;
            font-weight: 700;
            color: #FEF0C0;
            text-shadow: 0 0 30px rgba(212,175,55,0.7), 0 0 60px rgba(212,175,55,0.3);
            letter-spacing: 5px;
            transform: rotate(-2deg);
            transition: all 0.3s ease;
        }

        .logo:hover {
            transform: rotate(0deg) scale(1.04);
            text-shadow: 0 0 45px rgba(254,240,192,1), 0 0 90px rgba(212,175,55,0.5);
        }

        /* لیست آهنگ‌ها */
        .song-list {
            width: 100%;
            margin-bottom: 110px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .song-item {
            background: var(--black-card);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(212,175,55,0.22);
            border-radius: 12px;
            padding: 13px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 3px 15px rgba(0,0,0,0.5);
        }

        .song-item:hover {
            border-color: rgba(254,240,192,0.6);
            box-shadow: 0 6px 25px rgba(212,175,55,0.2), 0 0 0 1px rgba(212,175,55,0.4);
            transform: translateY(-2px);
            background: rgba(18,18,22,0.8);
        }

        .song-info {
            display: flex;
            flex-direction: column;
            z-index: 1;
            gap: 2px;
        }

        .song-title {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-weight: 600;
            font-size: 1.2rem;
            color: #B8A890; /* خاکستری-طلایی لوکس */
            letter-spacing: 0.5px;
            line-height: 1.2;
        }

        .song-artist {
            font-family: 'Montserrat', sans-serif;
            font-weight: 400;
            color: #C9A84C;
            font-size: 0.8rem;
            letter-spacing: 0.3px;
        }

        .play-circle {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px solid var(--gold);
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 1;
            flex-shrink: 0;
        }

        .play-circle svg {
            width: 15px;
            height: 15px;
            fill: var(--gold);
            transition: fill 0.3s;
        }

        .play-circle:hover {
            background: var(--gold);
            box-shadow: 0 0 20px rgba(212,175,55,0.7);
            transform: scale(1.1);
        }

        .play-circle:hover svg {
            fill: #050508;
        }

        /* پلیر */
        .player-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 32px);
            max-width: 550px;
            background: rgba(8,8,10,0.92);
            backdrop-filter: blur(22px);
            -webkit-backdrop-filter: blur(22px);
            border: 1px solid rgba(212,175,55,0.45);
            border-radius: 28px;
            padding: 10px 18px;
            display: none;
            align-items: center;
            gap: 12px;
            box-shadow: 0 0 50px rgba(212,175,55,0.25), 0 0 80px rgba(0,0,0,0.7);
            z-index: 1000;
        }

        .player-container.active {
            display: flex;
        }

        /* دکمه پخش شیک */
        .play-pause-btn {
            background: rgba(10,10,14,0.8);
            border: 2px solid var(--gold);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            flex-shrink: 0;
            box-shadow: 0 0 18px rgba(212,175,55,0.35);
            position: relative;
        }

        .play-pause-btn:hover {
            background: var(--gold);
            box-shadow: 0 0 35px rgba(255,215,0,0.8);
        }

        .play-icon::before,
        .pause-icon::before,
        .pause-icon::after {
            content: "";
            display: block;
            background: var(--gold);
            transition: background 0.3s;
        }

        .play-icon::before {
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 8px 0 8px 14px;
            border-color: transparent transparent transparent var(--gold);
            background: none;
            margin-left: 3px;
        }

        .play-pause-btn:hover .play-icon::before {
            border-left-color: #050508;
        }

        .pause-icon {
            display: none;
            gap: 4px;
        }

        .pause-icon::before,
        .pause-icon::after {
            width: 4px;
            height: 14px;
            border-radius: 2px;
        }

        .play-pause-btn:hover .pause-icon::before,
        .play-pause-btn:hover .pause-icon::after {
            background: #050508;
        }

        .play-pause-btn.playing .play-icon { display: none; }
        .play-pause-btn.playing .pause-icon { display: flex; }
        .play-pause-btn.paused .play-icon { display: block; }
        .play-pause-btn.paused .pause-icon { display: none; }

        .progress-container {
            flex: 1;
            height: 5px;
            background: #222;
            border-radius: 3px;
            cursor: pointer;
            overflow: hidden;
            box-shadow: inset 0 1px 3px #000;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--gold), var(--gold-light));
            width: 0%;
            border-radius: 3px;
            box-shadow: 0 0 8px var(--gold);
            transition: width 0.1s linear;
        }

        .time {
            color: var(--gold);
            font-size: 0.7rem;
            min-width: 70px;
            text-align: right;
            font-weight: 300;
            letter-spacing: 0.3px;
        }

        .vinyl-graphic {
            width: 44px;
            height: 44px;
            flex-shrink: 0;
            animation: rotateVinyl 2.5s linear infinite paused;
        }

        .vinyl-graphic.playing {
            animation-play-state: running;
        }

        @keyframes rotateVinyl {
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 600px) {
            .logo { font-size: 2.8rem; }
            .logo-area { margin-top: 45px; margin-bottom: 35px; gap: 12px; }
            .song-title { font-size: 1.05rem; }
            .song-artist { font-size: 0.75rem; }
            .song-item { padding: 11px 15px; }
            .player-container { bottom: 14px; padding: 8px 14px; gap: 10px; border-radius: 24px; }
            .play-pause-btn { width: 38px; height: 38px; }
            .vinyl-graphic { width: 38px; height: 38px; }
            .time { min-width: 60px; font-size: 0.65rem; }
            .border-frame { top: 6px; left: 6px; right: 6px; bottom: 6px; }
        }
    </style>
</head>
<body>
    <div class="particles">
        <div class="particle"></div><div class="particle"></div><div class="particle"></div>
        <div class="particle"></div><div class="particle"></div><div class="particle"></div>
        <div class="particle"></div><div class="particle"></div>
    </div>
    <div class="border-frame"></div>

    <div class="container">
        <div class="logo-area">
            <!-- مینیون با کت شلوار طلایی -->
            <div class="minion-container">
                <svg width="80" height="100" viewBox="0 0 80 100" fill="none">
                    <!-- کت شلوار (بالاتنه) -->
                    <path d="M25 45 L25 70 L55 70 L55 45 Z" fill="#1a1a1a" stroke="#D4AF37" stroke-width="1"/>
                    <!-- پیراهن سفید -->
                    <path d="M30 45 L30 55 L50 55 L50 45 Z" fill="#fff"/>
                    <!-- پاپیون -->
                    <path d="M35 42 L40 38 L45 42 L40 46 Z" fill="#D4AF37"/>
                    <path d="M40 38 L40 32" stroke="#D4AF37" stroke-width="2"/>
                    <!-- سر مینیون -->
                    <circle cx="40" cy="28" r="18" fill="#D4AF37" stroke="#B8860B" stroke-width="1.5"/>
                    <!-- عینک -->
                    <circle cx="40" cy="28" r="9" fill="#fff" stroke="#333" stroke-width="2"/>
                    <circle cx="40" cy="28" r="4" fill="#333"/>
                    <circle cx="42" cy="26" r="1.5" fill="#fff"/>
                    <!-- دهان -->
                    <path d="M36 35 Q40 39 44 35" stroke="#333" stroke-width="2" fill="none"/>
                    <!-- دست چپ (متحرک) -->
                    <g class="left-arm">
                        <path d="M25 48 L15 35 L10 38" stroke="#D4AF37" stroke-width="4" stroke-linecap="round" fill="none"/>
                    </g>
                    <!-- دست راست (متحرک) -->
                    <g class="right-arm">
                        <path d="M55 48 L65 35 L70 38" stroke="#D4AF37" stroke-width="4" stroke-linecap="round" fill="none"/>
                    </g>
                    <!-- پاها (متحرک) -->
                    <g class="left-leg">
                        <path d="M33 70 L33 85 L28 85" stroke="#1a1a1a" stroke-width="5" stroke-linecap="round" fill="none"/>
                    </g>
                    <g class="right-leg">
                        <path d="M47 70 L47 85 L52 85" stroke="#1a1a1a" stroke-width="5" stroke-linecap="round" fill="none"/>
                    </g>
                </svg>
            </div>
            <div class="logo">Samisaki</div>
        </div>

        <div class="song-list" id="songList"></div>

        <div class="player-container" id="playerContainer">
            <button class="play-pause-btn paused" id="playPauseBtn">
                <span class="play-icon"></span>
                <span class="pause-icon"></span>
            </button>
            <div class="progress-container" id="progressContainer">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <span class="time" id="timeDisplay">00:00 / 00:00</span>
            <div class="vinyl-graphic" id="vinylGraphic">
                <svg class="vinyl-svg" viewBox="0 0 100 100">
                    <defs>
                        <radialGradient id="vinylGrad" cx="50%" cy="50%">
                            <stop offset="0%" stop-color="#0a0a0a"/><stop offset="15%" stop-color="#1a1a1a"/>
                            <stop offset="30%" stop-color="#0a0a0a"/><stop offset="45%" stop-color="#1a1a1a"/>
                            <stop offset="70%" stop-color="#0a0a0a"/><stop offset="100%" stop-color="#0a0a0a"/>
                        </radialGradient>
                    </defs>
                    <circle cx="50" cy="50" r="48" fill="url(#vinylGrad)" stroke="#D4AF37" stroke-width="2"/>
                    <circle cx="50" cy="50" r="12" fill="#D4AF37" stroke="#FEF0C0" stroke-width="1.5"/>
                    <circle cx="50" cy="50" r="3" fill="#0a0a0a"/>
                </svg>
            </div>
        </div>
    </div>

    <audio id="audioPlayer"></audio>

    <script>
        const songs = [
            { title: "Bin Jip (3-Iron)", artist: "Natacha Atlas — Slvian", url: "https://dl.ritmahang.com/audio/arshive/natacha%20atlas%20-%20bin-jip%20(3-iron)%20ost%202004%20-%20slvian%20(www.delshekastegan.ir).mp3" },
            { title: "Maison", artist: "Emilio Piano x Lucie", url: "https://dl.musicviral.ir/Music/04-04/Emilio%20Piano%20x%20Lucie%20-%20Maison.mp3" },
            { title: "Summer Overture", artist: "Summer (Requiem for a Dream)", url: "https://www.musicdagh.ir/wp-content/uploads/2018/12/Summer-Overture-Summer.mp3" },
            { title: "Lux Aeterna", artist: "Winter (Requiem for a Dream)", url: "https://www.musicdagh.ir/wp-content/uploads/2018/12/Lux-Aeterna-Winter.mp3" },
            { title: "Roads", artist: "Portishead", url: "https://files.musicfeed.ir/2020/07/Portishead-Roads.mp3" },
            { title: "Game of Thrones", artist: "Ramin Djawadi", url: "https://irsv.upmusics.com/Downloads/Musics/Ramin%20Djawadi%20%7C%20Game%20Of%20Thrones%20(320).mp3" },
            { title: "Hostage", artist: "Billie Eilish", url: "https://sv.jenabmusic.com/music/2026/05/13/Billie-Eilish-Hostage.mp3" },
            { title: "Bad Guy", artist: "Billie Eilish", url: "https://sv.jenabmusic.com/music/2025/03/07/Billie%20Eilish%20-%20Bad%20Guy.Mp3" },
            { title: "No Time To Die", artist: "Billie Eilish", url: "https://sv.jenabmusic.com/music/2025/03/07/Billie%20Eilish%20-%20No%20Time%20To%20Die.Mp3" }
        ];

        const audio = document.getElementById('audioPlayer');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const progressBar = document.getElementById('progressBar');
        const progressContainer = document.getElementById('progressContainer');
        const timeDisplay = document.getElementById('timeDisplay');
        const playerContainer = document.getElementById('playerContainer');
        const vinylGraphic = document.getElementById('vinylGraphic');
        let currentSongIndex = -1;

        function formatTime(s) {
            if (isNaN(s)) return "00:00";
            const m = Math.floor(s / 60);
            const sec = Math.floor(s % 60);
            return `${m.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
        }

        function loadSong(index) {
            audio.src = songs[index].url;
            audio.load();
            playerContainer.classList.add('active');
            playPauseBtn.classList.add('paused');
            playPauseBtn.classList.remove('playing');
            vinylGraphic.classList.remove('playing');
            progressBar.style.width = '0%';
            timeDisplay.textContent = '00:00 / 00:00';
            currentSongIndex = index;
        }

        function togglePlay() {
            if (audio.paused) {
                audio.play();
                playPauseBtn.classList.add('playing');
                playPauseBtn.classList.remove('paused');
                vinylGraphic.classList.add('playing');
            } else {
                audio.pause();
                playPauseBtn.classList.add('paused');
                playPauseBtn.classList.remove('playing');
                vinylGraphic.classList.remove('playing');
            }
        }

        audio.addEventListener('timeupdate', () => {
            const pct = (audio.currentTime / audio.duration) * 100 || 0;
            progressBar.style.width = `${pct}%`;
            timeDisplay.textContent = `${formatTime(audio.currentTime)} / ${formatTime(audio.duration)}`;
        });

        audio.addEventListener('ended', () => {
            playPauseBtn.classList.add('paused');
            playPauseBtn.classList.remove('playing');
            vinylGraphic.classList.remove('playing');
        });

        progressContainer.addEventListener('click', (e) => {
            const rect = progressContainer.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const w = rect.width;
            audio.currentTime = (x / w) * audio.duration;
        });

        playPauseBtn.addEventListener('click', togglePlay);

        const listEl = document.getElementById('songList');
        songs.forEach((s, i) => {
            const item = document.createElement('div');
            item.className = 'song-item';
            item.innerHTML = `
                <div class="song-info">
                    <span class="song-title">${s.title}</span>
                    <span class="song-artist">${s.artist}</span>
                </div>
                <div class="play-circle">
                    <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                </div>
            `;
            item.querySelector('.play-circle').addEventListener('click', (e) => {
                e.stopPropagation();
                if (currentSongIndex === i) {
                    if (audio.paused) {
                        audio.play();
                        playPauseBtn.classList.add('playing');
                        playPauseBtn.classList.remove('paused');
                        vinylGraphic.classList.add('playing');
                    } else {
                        audio.pause();
                        playPauseBtn.classList.add('paused');
                        playPauseBtn.classList.remove('playing');
                        vinylGraphic.classList.remove('playing');
                    }
                } else {
                    loadSong(i);
                    audio.play();
                    playPauseBtn.classList.add('playing');
                    playPauseBtn.classList.remove('paused');
                    vinylGraphic.classList.add('playing');
                }
            });
            listEl.appendChild(item);
        });
    </script>
</body>
</html>
